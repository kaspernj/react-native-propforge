before_install:
  - sudo mkdir -p /etc/apt/keyrings
  - curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | sudo gpg --no-tty --batch --yes --dearmor -o /etc/apt/keyrings/nodesource.gpg
  - echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_24.x nodistro main" | sudo tee /etc/apt/sources.list.d/nodesource.list
  - sudo apt-get update
  - sudo apt-get install -y nodejs
before_script:
  - npm install
environment:
  NODE_ENV: test
builds:
  build_1:
    name: Tests
    script:
      - npm run test
  build_2:
    name: ESLint & Typecheck
    script:
      - npm run lint
      - npm run typecheck
  build_3:
    name: React Native 0.78 compatibility
    script:
      - npm run test:react-native-compatibility -- 0.78
  build_4:
    name: React Native 0.79 compatibility
    script:
      - npm run test:react-native-compatibility -- 0.79
  build_5:
    name: React Native 0.80 compatibility
    script:
      - npm run test:react-native-compatibility -- 0.80
  build_6:
    name: React Native 0.81 compatibility
    script:
      - npm run test:react-native-compatibility -- 0.81
